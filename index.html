<section id="register">

<h2 style="text-align: center;">Register for Event</h2>

<form>

<input
type="text"
placeholder="Enter your name"
required
autofocus>

<input
type="email"
placeholder="Enter your email"
required>

<input
type="text"
id="phone"
placeholder="Phone number"
onblur="validatePhone()">

<input type="date" required>

<select id="eventType" onchange="showFee()">
<option>Select Event</option>
<option>Music</option>
<option>Sports</option>
<option>Food</option>
</select>

<p id="fee"></p>

<textarea
id="feedback"
placeholder="Your message"
onkeyup="countChars()">
</textarea>

<p>Characters: <span id="count">0</span></p>

<button
type="button"
onclick="submitForm()">
Submit
</button>

<button
type="button"
onclick="clearData()">
Clear Preferences
</button>

<output id="output"></output>

</form>

</section>


<section>

<h2 style="text-align:center;">Promo Video</h2>

<div style="text-align:center;">

<video
width="400"
controls
oncanplay="videoReady()">

<source
src="https://www.w3schools.com/html/mov_bbb.mp4"
type="video/mp4">

</video>

<p id="videoMsg"></p>

</div>

</section>


<button onclick="findLocation()">
Find Nearby Events
</button>

<p id="location"></p>

</section>



<footer>
<p>Community Event Portal</p>
</footer>



<script>

function validatePhone(){
let phone=document.getElementById("phone").value;

if(phone.length!=10){
alert("Enter 10 digit phone number");
}
}


function showFee(){

let event=document.getElementById("eventType").value;
let fee="";

if(event=="Music") fee="Fee: ₹100";
if(event=="Sports") fee="Fee: ₹150";
if(event=="Food") fee="Fee: ₹80";

document.getElementById("fee").innerHTML=fee;

localStorage.setItem("eventType",event);
}


window.onload=function(){

let saved=localStorage.getItem("eventType");

if(saved){
document.getElementById("eventType").value=saved;
showFee();
}

}



function submitForm(){
document.getElementById("output").innerHTML=
"Registration Successful";
}


function enlarge(img){
img.style.width="300px";
}


function countChars(){

let count=document.getElementById("feedback").value.length;

document.getElementById("count").innerHTML=count;

}


function videoReady(){
document.getElementById("videoMsg").innerHTML=
"Video ready to play";
}


function clearData(){
localStorage.clear();
sessionStorage.clear();
alert("Preferences Cleared");
}



function findLocation(){

navigator.geolocation.getCurrentPosition(

function(position){
document.getElementById("location").innerHTML=
"Latitude: " + position.coords.latitude +
"<br>Longitude: " + position.coords.longitude;
},

function(){
document.getElementById("location").innerHTML=
"Location access denied";
}

);

}


window.onbeforeunload=function(){
return "Are you sure you want to leave?";
}

</script>
